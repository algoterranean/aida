[AccessTransformers]
; Ghost previews of belt/pipe runs (AIDAActionSeam::SpawnGhostRunHologram) route the spline
; directly with the holograms' own private router — the build-gun two-step drive alone left
; display-only splines as stubs (live-verify 2026-07-17).
Friend=(Class="FGSplineHologram", FriendClass="FAIDAGhostRunAccess")
Friend=(Class="FGConveyorBeltHologram", FriendClass="FAIDAGhostRunAccess")
Friend=(Class="FGPipelineHologram", FriendClass="FAIDAGhostRunAccess")
; Belt-tap source census (AIDAActionSeam::FindTapSource) reads a belt's items directly — the public
; GetConveyorBeltItems only serves chain-actor belts; unchained belts keep items in protected mItems.
Friend=(Class="FGBuildableConveyorBase", FriendClass="FAIDABeltAccess")
